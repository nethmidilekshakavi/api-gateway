server:
  port: 9000
  address: 0.0.0.0

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        - id: user-service-route
          uri: lb://USER-SERVICE
          predicates:
            - Path=/api/users/**

        - id: auth-route
          uri: lb://USER-SERVICE
          predicates:
            - Path=/auth/**

        - id: item-service-route
          uri: lb://ITEM-SERVICE
          predicates:
            - Path=/api/items/**

        - id: claim-service-route
          uri: lb://CLAIM-SERVICE
          predicates:
            - Path=/api/claims/**

eureka:
  client:
    service-url:
      defaultZone: http://34.47.225.165:8761/eureka/

  instance:
    prefer-ip-address: true
    ip-address: 34.47.225.165
    instance-id: ${spring.application.name}:${random.value}