server:
  port: 9000

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        - id: test-service
          uri: http://localhost:8081
          predicates:
                  - id: item-service
                    uri: lb://ITEM-SERVICE
                    predicates:
                      - Path=/items/**

                  - id: claim-service
                    uri: lb://CLAIM-SERVICE
                    predicates:
                      - Path=/claims/**

                  - id: user-service
                    uri: lb://USER-SERVICE
                    predicates:
                      - Path=/users/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/